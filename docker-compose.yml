# Runs only retry-orchestrator on the external Docker network shared with ``event-platform-infra``.
#
# Prerequisites: broker already up (``cd event-platform-infra && docker compose up -d``).
# Start this before ``event-platform-notification-service`` so ``retry.exchange`` topology exists.
#
# Requires ``.env`` (copy from ``.env.example``). Compose sets ``RABBITMQ_HOST=rabbitmq``.

services:
  retry-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-platform-retry-orchestrator-service
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
    restart: unless-stopped
    networks:
      - event-platform

networks:
  event-platform:
    external: true
    name: ${EVENT_PLATFORM_NETWORK_NAME}
